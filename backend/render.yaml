# Render blueprint for the ReputeX backend.
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# Render reads this file, provisions the service, and prompts for the secret
# env vars marked `sync: false`.
#
# The API runs as a FREE web service. The Telegram bot runs in WEBHOOK mode from
# this same service (no separate paid worker needed) — it activates automatically
# when TELEGRAM_BOT_TOKEN is set, using Render's injected RENDER_EXTERNAL_URL.

services:
  - type: web
    name: reputex-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # CORS allowlist — must exactly match your deployed frontend origin(s).
      - key: CORS_ORIGINS
        value: https://reputex-ai.netlify.app
      # Public URL of the web app (used for bot "Full report" links).
      - key: WEB_APP_URL
        value: https://reputex-ai.netlify.app
      # Provider secrets — entered in the Render dashboard, never committed.
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: MORALIS_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Telegram bot — paste the FULL BotFather token (<bot_id>:<secret>) to
      # enable webhook mode. Leave blank to run the API without the bot.
      - key: TELEGRAM_BOT_TOKEN
        sync: false
